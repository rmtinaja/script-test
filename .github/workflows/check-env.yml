name: Check Secrets & Variables

# Diagnostic only — prints which secrets/variables resolve.
# Variables print their real values; secret VALUES are masked by GitHub,
# so they show as SET (length N) or EMPTY. Delete this file once verified.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    environment: staging   # must match the environment where you stored these
    steps:
      - name: Probe
        env:
          # secrets must be mapped to env vars to be length-checked (values stay masked)
          S_PAT: ${{ secrets.PAT }}
          S_SSH_KEY: ${{ secrets.SSH_KEY }}
          S_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S_DB2_PASSWORD: ${{ secrets.DB2_PASSWORD }}
        run: |
          echo "===================== VARIABLES (vars.* — real values) ====================="
          echo "APP_HOST     = ${{ vars.APP_HOST }}"
          echo "APP_PORT     = ${{ vars.APP_PORT }}"
          echo "APP_SSH_USER = ${{ vars.APP_SSH_USER }}"
          echo "APP_URL      = ${{ vars.APP_URL }}"
          echo "DB_DATABASE  = ${{ vars.DB_DATABASE }}"
          echo "DB_USERNAME  = ${{ vars.DB_USERNAME }}"
          echo "DB2_HOST     = ${{ vars.DB2_HOST }}"
          echo "DB2_PORT     = ${{ vars.DB2_PORT }}"
          echo "DB2_DATABASE = ${{ vars.DB2_DATABASE }}"
          echo "DB2_USERNAME = ${{ vars.DB2_USERNAME }}"

          echo ""
          echo "===================== SECRETS (secrets.* — value masked) ====================="
          probe () { if [ -n "$2" ]; then echo "$1 = SET (length ${#2})"; else echo "$1 = (EMPTY / not found)"; fi; }
          probe PAT          "$S_PAT"
          probe SSH_KEY      "$S_SSH_KEY"
          probe DB_PASSWORD  "$S_DB_PASSWORD"
          probe DB2_PASSWORD "$S_DB2_PASSWORD"
